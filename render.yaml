services:
  - type: web
    name: vin-tracker-api
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    disk:
      name: vin-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/vins.db
      - key: PORT
        value: 3002
